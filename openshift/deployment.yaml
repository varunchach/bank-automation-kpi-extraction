apiVersion: apps/v1
kind: Deployment
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indian-bank-pnb-kpi
  template:
    metadata:
      labels:
        app: indian-bank-pnb-kpi
    spec:
      containers:
        - name: app
          image: quay.io/vraste/indian-bank-pnb-kpi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "2"
          # To use GPU: uncomment below and run discover_gpu_config.sh to confirm resource name.
          # requests: nvidia.com/gpu: "1"
          # limits: nvidia.com/gpu: "1"
          env:
            - name: HOME
              value: "/tmp"
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            # Optional: set these if the default LLM is not reachable from OCP (e.g. internal RH URL).
            # - name: LLM_BASE_URL
            #   value: "https://your-llm-endpoint/v1"
            # - name: LLM_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: llm-secret
            #       key: api-key
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
spec:
  ports:
    - port: 8501
      targetPort: 8501
      protocol: TCP
      name: http
  selector:
    app: indian-bank-pnb-kpi
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
  annotations:
    # Allow long report runs (40 min); default is 30s
    haproxy.router.openshift.io/timeout: 2400s
spec:
  to:
    kind: Service
    name: indian-bank-pnb-kpi
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
