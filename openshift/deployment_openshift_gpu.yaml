# OpenShift deployment with GPU (nvidia.com/gpu). Use image :openshift-gpu (CUDA PyTorch).
# Apply after: ./build_and_push_openshift_gpu.sh
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indian-bank-pnb-kpi
  template:
    metadata:
      labels:
        app: indian-bank-pnb-kpi
    spec:
      containers:
        - name: app
          image: quay.io/vraste/indian-bank-pnb-kpi:openshift-gpu
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "6"
              nvidia.com/gpu: "1"
          env:
            - name: HOME
              value: "/tmp"
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
spec:
  ports:
    - port: 8501
      targetPort: 8501
      protocol: TCP
      name: http
  selector:
    app: indian-bank-pnb-kpi
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: indian-bank-pnb-kpi
  labels:
    app: indian-bank-pnb-kpi
  annotations:
    haproxy.router.openshift.io/timeout: 2400s
spec:
  to:
    kind: Service
    name: indian-bank-pnb-kpi
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
